name: AI Code Review

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, labeled]
  workflow_dispatch:
    inputs:
      base_ref:
        description: Branch to compare the selected ref against
        required: true
        default: main

concurrency:
  group: ai-code-review-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  review:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.head.repo.full_name == github.repository &&
      (github.event.action != 'labeled' || github.event.label.name == 'ai-cr:review'))
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    outputs:
      execution: ${{ steps.normalize.outputs.execution }}
      summary: ${{ steps.normalize.outputs.summary }}
      verdict: ${{ steps.normalize.outputs.verdict }}
    steps:
      - name: Checkout trusted review code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Configure Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: packages/code-review/package-lock.json

      - name: Create bounded review diff
        id: diff
        continue-on-error: true
        shell: bash
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          BASE_REF: ${{ inputs.base_ref }}
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            git fetch --no-tags origin "$HEAD_SHA"
          else
            git fetch --no-tags origin "$BASE_REF"
            BASE_SHA="origin/$BASE_REF"
            HEAD_SHA="HEAD"
          fi

          git diff --no-ext-diff --unified=20 "$BASE_SHA...$HEAD_SHA" > "$RUNNER_TEMP/review.diff"
          diff_bytes=$(wc -c < "$RUNNER_TEMP/review.diff")
          test "$diff_bytes" -gt 0
          test "$diff_bytes" -le 204800

      - name: Run bounded code review
        id: action
        if: steps.diff.outcome == 'success'
        continue-on-error: true
        uses: ./.github/actions/code-review
        with:
          title: ${{ github.event.pull_request.title || format('Manual review of {0}', github.ref_name) }}
          description: ${{ github.event.pull_request.body }}
          diff-path: ${{ runner.temp }}/review.diff
          provider: ${{ vars.CODEX_PROVIDER || 'openai' }}
          model: ${{ vars.CODEX_REVIEW_MODEL }}
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}

      - name: Normalize review result
        id: normalize
        if: always()
        shell: bash
        env:
          ACTION_OUTCOME: ${{ steps.action.outcome }}
          REVIEW_SUMMARY: ${{ steps.action.outputs.summary }}
          REVIEW_VERDICT: ${{ steps.action.outputs.verdict }}
        run: |
          if [[ "$ACTION_OUTCOME" == "success" ]]; then
            delimiter="SUMMARY_$(uuidgen)"
            {
              echo "execution=success"
              echo "verdict=$REVIEW_VERDICT"
              echo "summary<<$delimiter"
              echo "$REVIEW_SUMMARY"
              echo "$delimiter"
            } >> "$GITHUB_OUTPUT"
            printf '%s\n' "$REVIEW_SUMMARY" >> "$GITHUB_STEP_SUMMARY"
          else
            {
              echo "execution=error"
              echo "verdict="
              echo "summary=The review could not complete. Check the workflow run for details."
            } >> "$GITHUB_OUTPUT"
            echo "## AI code review error" >> "$GITHUB_STEP_SUMMARY"
            echo "The review could not complete. Check the workflow run for details." >> "$GITHUB_STEP_SUMMARY"
          fi

  publish:
    if: always() && github.event_name == 'pull_request' && needs.review.result != 'skipped'
    needs: review
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
      - name: Checkout trusted publication helper
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          persist-credentials: false

      - name: Publish review result
        uses: actions/github-script@v7
        env:
          REVIEW_EXECUTION: ${{ needs.review.outputs.execution }}
          REVIEW_SUMMARY: ${{ needs.review.outputs.summary }}
          REVIEW_VERDICT: ${{ needs.review.outputs.verdict }}
        with:
          script: |
            const { publishCodeReview } = require(
              `${process.env.GITHUB_WORKSPACE}/.github/scripts/publish-code-review.cjs`,
            );
            await publishCodeReview({
              github,
              owner: context.repo.owner,
              repo: context.repo.repo,
              issueNumber: context.issue.number,
              execution: process.env.REVIEW_EXECUTION,
              verdict: process.env.REVIEW_VERDICT,
              summary: process.env.REVIEW_SUMMARY,
            });

  gate:
    if: >-
      always() && (github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.head.repo.full_name == github.repository &&
      (github.event.action != 'labeled' || github.event.label.name == 'ai-cr:review')))
    needs: [review, publish]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Enforce review and publication success
        shell: bash
        env:
          PUBLICATION_RESULT: ${{ needs.publish.result }}
          REVIEW_EXECUTION: ${{ needs.review.outputs.execution }}
          REVIEW_VERDICT: ${{ needs.review.outputs.verdict }}
        run: |
          test "$REVIEW_EXECUTION" = "success"
          test "$REVIEW_VERDICT" = "pass"
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            test "$PUBLICATION_RESULT" = "success"
          fi
